version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./stitchcore.db
      - SECRET_KEY=change-this-in-production
      - DEBUG=True
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend-shop:
    build:
      context: ./frontend-shop
      args:
        - VITE_API_URL=http://31.3.218.196:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-shop:/app
    command: npm run dev -- --host

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        - VITE_API_URL=http://31.3.218.196:8000
    ports:
      - "5174:5174"
    volumes:
      - ./frontend-admin:/app
    command: npm run dev -- --host
