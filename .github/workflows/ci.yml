name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Check imports and syntax
        run: python -c "import ast; ast.parse(open('app/main.py').read())"

      - name: Start backend server
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo "PID=$!"
          # Wait for server to be ready (poll / endpoint)
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8000/ > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start"
              cat /tmp/uvicorn.log
              exit 1
            fi
            sleep 1
          done

      - name: Run API tests
        run: python ../test_all.py

      - name: Stop backend server
        if: always()
        run: pkill -f "uvicorn app.main:app" || true

  frontend-shop:
    name: Frontend Shop (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-shop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-shop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  frontend-admin:
    name: Frontend Admin (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
