name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 31.3.218.196
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/stitchcore
            git pull
            docker compose up -d --build